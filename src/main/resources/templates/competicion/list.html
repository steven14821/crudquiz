<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><title>Competiciones — FutbolDB</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: sidebar}" th:with="currentPage='competiciones'"></div>
<main class="main">
  <div class="page-header">
    <div><h2>COMPETI<span>CIONES</span></h2><p>Relación @ManyToMany con Club</p></div>
    <a th:href="@{/competiciones/nuevo}" class="btn btn-primary">＋ Nueva</a>
  </div>
  <div class="table-card">
    <div class="empty-state" th:if="${#lists.isEmpty(competiciones)}">
      <span class="empty-icon">🏆</span><p>No hay competiciones.</p>
      <a th:href="@{/competiciones/nuevo}" class="btn btn-primary">Agregar competición</a>
    </div>
    <table th:unless="${#lists.isEmpty(competiciones)}">
      <thead><tr><th>#</th><th>Nombre</th><th>Monto Premio</th><th>Inicio</th><th>Fin</th><th>Acciones</th></tr></thead>
      <tbody>
        <tr th:each="c : ${competiciones}">
          <td style="color:var(--muted)" th:text="${c.id}"></td>
          <td style="font-family:var(--font-h);font-size:16px;font-weight:700" th:text="${c.nombre}"></td>
          <td>
            <span class="badge badge-gold"
                  th:text="'$' + ${#numbers.formatInteger(c.montoPremio, 1, 'COMMA')}"></span>
          </td>
          <td th:text="${c.fechaInicio}"></td>
          <td th:text="${c.fechaFin}"></td>
          <td><div class="actions">
            <a th:href="@{/competiciones/{id}/editar(id=${c.id})}" class="btn btn-outline btn-sm">Editar</a>
            <a th:href="@{/competiciones/{id}/eliminar(id=${c.id})}" class="btn btn-danger btn-sm"
               onclick="return confirm('¿Eliminar?')">Eliminar</a>
          </div></td>
        </tr>
      </tbody>
    </table>
  </div>
</main>
</body>
</html>
