<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><title>Competición — FutbolDB</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: sidebar}" th:with="currentPage='competiciones'"></div>
<main class="main">
  <div class="page-header">
    <div>
      <h2 th:if="${competicion.id == null}">NUEVA <span>COMPETICIÓN</span></h2>
      <h2 th:unless="${competicion.id == null}">EDITAR <span>COMPETICIÓN</span></h2>
    </div>
    <a th:href="@{/competiciones}" class="btn btn-outline">← Volver</a>
  </div>
  <div class="form-card">
    <form th:action="@{/competiciones/guardar}" method="post">
      <input type="hidden" name="id" th:value="${competicion.id}">
      <div class="form-grid">
        <div class="form-group full">
          <label>Nombre</label>
          <input type="text" name="nombre" th:value="${competicion.nombre}"
                 placeholder="Copa Libertadores" required>
        </div>
        <div class="form-group full">
          <label>Monto Premio ($)</label>
          <input type="number" name="montoPremio" th:value="${competicion.montoPremio}"
                 placeholder="20000000" min="0" required>
        </div>
        <div class="form-group">
          <label>Fecha Inicio</label>
          <input type="date" name="fechaInicio" th:value="${competicion.fechaInicio}" required>
        </div>
        <div class="form-group">
          <label>Fecha Fin</label>
          <input type="date" name="fechaFin" th:value="${competicion.fechaFin}" required>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Guardar</button>
        <a th:href="@{/competiciones}" class="btn btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</main>
</body>
</html>
