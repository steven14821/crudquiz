<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><title>Asociación — FutbolDB</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: sidebar}" th:with="currentPage='asociaciones'"></div>
<main class="main">
  <div class="page-header">
    <div>
      <h2 th:if="${asociacion.id == null}">NUEVA <span>ASOCIACIÓN</span></h2>
      <h2 th:unless="${asociacion.id == null}">EDITAR <span>ASOCIACIÓN</span></h2>
    </div>
    <a th:href="@{/asociaciones}" class="btn btn-outline">← Volver</a>
  </div>
  <div class="form-card">
    <form th:action="@{/asociaciones/guardar}" th:object="${asociacion}" method="post">
      <input type="hidden" th:field="*{id}">
      <div class="form-grid">
        <div class="form-group full">
          <label>Nombre</label>
          <input type="text" th:field="*{nombre}" placeholder="FCF" required>
        </div>
        <div class="form-group">
          <label>País</label>
          <input type="text" th:field="*{pais}" placeholder="Colombia" required>
        </div>
        <div class="form-group">
          <label>Presidente</label>
          <input type="text" th:field="*{presidente}" required>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Guardar</button>
        <a th:href="@{/asociaciones}" class="btn btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</main>
</body>
</html>
