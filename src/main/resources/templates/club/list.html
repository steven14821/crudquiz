<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Clubes — FutbolDB</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/nav :: sidebar}" th:with="currentPage='clubs'"></div>

<main class="main">
  <div class="page-header">
    <div>
      <h2>CLUBES <span>REGISTRADOS</span></h2>
      <p>Gestión de clubes y sus relaciones JPA</p>
    </div>
    <a th:href="@{/clubs/nuevo}" class="btn btn-primary">＋ Nuevo Club</a>
  </div>

  <div class="table-card" th:if="${#lists.isEmpty(clubs)}">
    <div class="empty-state">
      <span class="empty-icon">🏟</span>
      <p>No hay clubes registrados aún.</p>
      <a th:href="@{/clubs/nuevo}" class="btn btn-primary">Registrar primer club</a>
    </div>
  </div>

  <div class="table-card" th:if="${!#lists.isEmpty(clubs)}">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Club</th>
          <th>Entrenador</th>
          <th>Asociación</th>
          <th>Jugadores</th>
          <th>Competiciones</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="c : ${clubs}">
          <td style="color:var(--muted)" th:text="${c.id}"></td>
          <td style="font-family:var(--font-h);font-size:16px;font-weight:700"
              th:text="${c.nombre}"></td>
          <td th:text="${c.entrenador != null ? c.entrenador.nombre + ' ' + c.entrenador.apellido : '—'}"></td>
          <td>
            <span class="badge" th:if="${c.asociacion != null}" th:text="${c.asociacion.nombre}"></span>
            <span th:unless="${c.asociacion != null}" style="color:var(--muted)">—</span>
          </td>
          <td>
            <span class="badge badge-gold" th:text="${#lists.size(c.jugadores)} + ' jugadores'"></span>
          </td>
          <td th:text="${#lists.size(c.competiciones)}"></td>
          <td>
            <div class="actions">
              <a th:href="@{/clubs/{id}/detalle(id=${c.id})}" class="btn btn-outline btn-sm">Ver</a>
              <a th:href="@{/clubs/{id}/editar(id=${c.id})}" class="btn btn-outline btn-sm">Editar</a>
              <a th:href="@{/clubs/{id}/eliminar(id=${c.id})}" class="btn btn-danger btn-sm"
                 onclick="return confirm('¿Eliminar este club?')">Eliminar</a>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>
</body>
</html>
