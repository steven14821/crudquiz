<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><title>Jugador — FutbolDB</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: sidebar}" th:with="currentPage='jugadores'"></div>
<main class="main">
  <div class="page-header">
    <div>
      <h2 th:if="${jugador.id == null}">NUEVO <span>JUGADOR</span></h2>
      <h2 th:unless="${jugador.id == null}">EDITAR <span>JUGADOR</span></h2>
    </div>
    <a th:href="@{/jugadores}" class="btn btn-outline">← Volver</a>
  </div>
  <div class="form-card">
    <form th:action="@{/jugadores/guardar}" th:object="${jugador}" method="post">
      <input type="hidden" th:field="*{id}">
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" th:field="*{nombre}" required>
        </div>
        <div class="form-group">
          <label>Apellido</label>
          <input type="text" th:field="*{apellido}" required>
        </div>
        <div class="form-group">
          <label>Número / Dorsal</label>
          <input type="number" th:field="*{numero}" min="1" max="99" required>
        </div>
        <div class="form-group">
          <label>Posición</label>
          <select th:field="*{posicion}" required>
            <option value="">— Seleccionar —</option>
            <option value="Portero">Portero</option>
            <option value="Defensa">Defensa</option>
            <option value="Mediocampista">Mediocampista</option>
            <option value="Delantero">Delantero</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Guardar</button>
        <a th:href="@{/jugadores}" class="btn btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</main>
</body>
</html>
