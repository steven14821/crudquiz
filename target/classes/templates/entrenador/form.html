<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><title>Entrenador — FutbolDB</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments/nav :: sidebar}" th:with="currentPage='entrenadores'"></div>
<main class="main">
  <div class="page-header">
    <div>
      <h2 th:if="${entrenador.id == null}">NUEVO <span>ENTRENADOR</span></h2>
      <h2 th:unless="${entrenador.id == null}">EDITAR <span>ENTRENADOR</span></h2>
    </div>
    <a th:href="@{/entrenadores}" class="btn btn-outline">← Volver</a>
  </div>
  <div class="form-card">
    <form th:action="@{/entrenadores/guardar}" th:object="${entrenador}" method="post">
      <input type="hidden" th:field="*{id}">
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre</label>
          <input type="text" th:field="*{nombre}" placeholder="Carlos" required>
        </div>
        <div class="form-group">
          <label>Apellido</label>
          <input type="text" th:field="*{apellido}" placeholder="Queiroz" required>
        </div>
        <div class="form-group">
          <label>Edad</label>
          <input type="number" th:field="*{edad}" min="20" max="90" required>
        </div>
        <div class="form-group">
          <label>Nacionalidad</label>
          <input type="text" th:field="*{nacionalidad}" placeholder="Portuguesa" required>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">💾 Guardar</button>
        <a th:href="@{/entrenadores}" class="btn btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</main>
</body>
</html>
